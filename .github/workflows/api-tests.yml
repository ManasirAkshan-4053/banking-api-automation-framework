name: API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install json-server
        run: |
          npm install -g json-server

      - name: Start json-server
        run: |
          nohup json-server --watch db.json --port 3000 &
          sleep 5

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install default-jre -y
          wget https://github.com/allure-framework/allure2/releases/download/2.37.0/allure-2.37.0.tgz
          tar -zxvf allure-2.37.0.tgz
          sudo mv allure-2.37.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Run Tests with Allure
        run: |
          export ENV=dev
          pytest --alluredir=allure-results

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report